<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Прыг-Скок: Уровни</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game-container">
    <!-- Анимированный задний фон -->
    <div id="animated-bg">
        <div class="bg-layer bg-gradient"></div>
        <div class="bg-particles"></div>
        <div class="bg-shapes">
            <div class="shape"></div>
            <div class="shape"></div>
            <div class="shape"></div>
        </div>
    </div>
    
    <div id="score-hud">Цель: 0/20</div>
    <canvas id="game" width="400" height="600"></canvas>

    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="mainMenu" class="screen">
        <div class="menu-panel">
            <h1 class="game-title">ПРЫГ-СКОК</h1>
            <button class="menu-btn btn-play" onclick="showLevelSelect()">🎮 ИГРАТЬ</button>
            <button class="menu-btn btn-secondary" onclick="alert('В разработке')">🏆 РЕЙТИНГ</button>
            
            <!-- Кнопки управления звуком -->
            <div class="sound-controls">
                <button class="sound-btn" id="soundToggleBtn" onclick="toggleSound()" title="Включить/Выключить звук">
                    <span id="soundIcon">🔊</span>
                </button>
            </div>
        </div>
    </div>

    <!-- ВЫБОР УРОВНЯ -->
    <div id="levelSelect" class="screen hidden">
        <div class="world-map-title">КАРТА МИРОВ</div>
        <div id="levels-grid"></div>
        <button class="menu-btn btn-back" style="width: 200px;" onclick="toMainMenu()">⬅ НАЗАД</button>
    </div>

    <!-- ПРЕВЬЮ УРОВНЯ -->
    <div id="levelPreview" class="screen hidden">
        <div class="menu-panel">
            <h2 id="prevTitle" style="margin:0; color:#333; font-weight:900;">Уровень 1</h2>
            <div id="prevIcon" class="preview-icon">🪙</div>
            <div class="level-difficulty">⭐ Сложность: <span id="prevDiff">Легко</span></div>
            <div id="prevDesc" class="level-desc">Описание...</div>

            <button class="menu-btn btn-start-lvl" onclick="confirmStartLevel()">▶ НАЧАТЬ</button>
            <button class="menu-btn btn-back" onclick="backToGrid()">✕ ОТМЕНА</button>
        </div>
    </div>

    <!-- GAME OVER -->
    <div id="gameOverScreen" class="screen hidden">
        <div class="menu-panel">
            <h1 class="game-title" style="font-size: 28px;">🎯 ФИНИШ</h1>
            <div id="endStatus" class="status-msg">Результат</div>
            <div class="final-score" id="finalScoreValue">0</div>

            <button class="menu-btn btn-play" onclick="restartLevel()">🔄 ЗАНОВО</button>
            <button class="menu-btn btn-secondary" onclick="showLevelSelect()">🗺 К КАРТЕ</button>
            <button class="menu-btn btn-back" onclick="toMainMenu()">🏠 МЕНЮ</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
