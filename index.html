<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Прыг-Скок: Уровни</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game-container">
    <!-- Анимированный задний фон -->
    <div id="animated-bg">
        <div class="bg-layer bg-gradient"></div>
        <div class="bg-particles"></div>
        <div class="bg-shapes">
            <div class="shape"></div>
            <div class="shape"></div>
            <div class="shape"></div>
        </div>
    </div>
    
    <!-- Разделённые счётчики: монеты для магазина и очки для лидеров -->
    <!-- Верхняя левая панель: очки и монеты -->
    <div id="top-left-hud" style="position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 8px; color: #fff; font-weight: bold; font-family: 'Nunito', sans-serif; display: none; z-index: 10;">
        <div id="score-points-display">⭐ 0</div>
        <div id="coins-display" style="color: #FFD700;">🪙 0</div>
    </div>
    
    <!-- Верхняя центральная панель: задание уровня -->
    <div id="top-center-hud" style="position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, rgba(255, 107, 107, 0.95), rgba(254, 202, 87, 0.95)); padding: 10px 25px; border-radius: 25px; color: #fff; font-weight: 800; font-family: 'Nunito', sans-serif; display: none; z-index: 10; box-shadow: 0 8px 32px rgba(255, 107, 107, 0.4); letter-spacing: 0.5px; text-shadow: 0 2px 4px rgba(0,0,0,0.2);">
        <span id="level-goal-text">Цель: 0/20</span>
    </div>
    
    <!-- Верхняя правая панель: кнопка паузы -->
    <button id="pause-btn" style="position: absolute; top: 10px; right: 10px; width: 44px; height: 44px; border-radius: 50%; border: none; background: linear-gradient(135deg, #6c5ce7, #a29bfe); color: white; font-size: 20px; cursor: pointer; display: none; z-index: 10; box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);" onclick="togglePause()">⏸️</button>
    
    <!-- Нижняя левая панель: собранные фрукты -->
    <div id="fruits-collected-hud" style="position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 8px; color: #fff; font-weight: bold; font-family: 'Nunito', sans-serif; display: none; z-index: 10; min-width: 80px;">
        <div id="fruits-list" style="display: flex; flex-direction: column; gap: 4px;"></div>
    </div>
    
    <div id="currency-display" style="position: absolute; top: 50px; right: 10px; background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 8px; color: #FFD700; font-weight: bold; font-family: 'Nunito', sans-serif; display: none; z-index: 10;">
        🪙 <span id="coins-count">0</span>
    </div>
    <canvas id="game" width="400" height="600"></canvas>

    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="mainMenu" class="screen">
        <!-- Гирлянда сверху -->
        <div class="garland-top">
            <div class="garland-wire"></div>
            <div class="garland-light light-1"></div>
            <div class="garland-light light-2"></div>
            <div class="garland-light light-3"></div>
            <div class="garland-light light-4"></div>
            <div class="garland-light light-5"></div>
            <div class="garland-light light-6"></div>
            <div class="garland-light light-7"></div>
            <div class="garland-light light-8"></div>
        </div>
        
        <!-- Гирлянда снизу -->
        <div class="garland-bottom">
            <div class="garland-wire"></div>
            <div class="garland-light light-1"></div>
            <div class="garland-light light-2"></div>
            <div class="garland-light light-3"></div>
            <div class="garland-light light-4"></div>
            <div class="garland-light light-5"></div>
            <div class="garland-light light-6"></div>
            <div class="garland-light light-7"></div>
            <div class="garland-light light-8"></div>
        </div>
        
        <!-- Декоративные элементы -->
        <div class="menu-decorations">
            <div class="floating-star star-1">⭐</div>
            <div class="floating-star star-2">✨</div>
            <div class="floating-star star-3">🌟</div>
            <div class="floating-heart heart-1">💖</div>
            <div class="floating-heart heart-2">💕</div>
            <div class="floating-circle circle-1"></div>
            <div class="floating-circle circle-2"></div>
        </div>
        
        <div class="menu-panel">
            <h1 class="game-title">ПРЫГ-СКОК</h1>
            <button class="menu-btn btn-play" onclick="showLevelSelect()">🎮 ИГРАТЬ</button>
            <button class="menu-btn btn-secondary" onclick="alert('В разработке')">🏆 РЕЙТИНГ</button>
            
            <!-- Кнопка управления звуком -->
            <div class="sound-controls">
                <button class="sound-btn" id="soundToggleBtn" onclick="toggleAllSound()" title="Включить/Выключить все звуки">
                    <span id="soundIcon">🔊</span>
                </button>
            </div>
            
            <!-- Отладочная панель -->
            <div class="debug-panel" style="margin-top: 20px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 8px;">
                <div style="color: #fff; font-size: 12px; margin-bottom: 8px; font-weight: 600;">🔧 ОТЛАДКА</div>
                <button class="menu-btn btn-back" style="width: 100%; margin-bottom: 5px; font-size: 12px; padding: 8px;" onclick="clearCoinsStorage()">💰 Сбросить монеты</button>
                <button class="menu-btn btn-back" style="width: 100%; font-size: 12px; padding: 8px;" onclick="clearLevelsStorage()">🗺 Сбросить уровни</button>
            </div>
        </div>
    </div>

    <!-- ВЫБОР УРОВНЯ -->
    <div id="levelSelect" class="screen hidden">
        <div class="world-map-title">КАРТА МИРОВ</div>
        <div id="levels-grid"></div>
        <button class="menu-btn btn-back" style="width: 200px;" onclick="toMainMenu()">⬅ НАЗАД</button>
    </div>

    <!-- ПРЕВЬЮ УРОВНЯ -->
    <div id="levelPreview" class="screen hidden">
        <div class="menu-panel">
            <h2 id="prevTitle" style="margin:0; color:#333; font-weight:900;">Уровень 1</h2>
            <div id="prevIcon" class="preview-icon">🪙</div>
            <div class="level-difficulty">⭐ Сложность: <span id="prevDiff">Легко</span></div>
            <div id="prevDesc" class="level-desc">Описание...</div>

            <button class="menu-btn btn-start-lvl" onclick="confirmStartLevel()">▶ НАЧАТЬ</button>
            <button class="menu-btn btn-back" onclick="backToGrid()">✕ ОТМЕНА</button>
        </div>
    </div>

    <!-- GAME OVER -->
    <div id="gameOverScreen" class="screen hidden">
        <div class="menu-panel">
            <h1 class="game-title" style="font-size: 28px;">🎯 ФИНИШ</h1>
            <div id="endStatus" class="status-msg">Результат</div>
            <div class="final-score" id="finalScoreValue">0</div>

            <button class="menu-btn btn-play" onclick="restartLevel()">🔄 ЗАНОВО</button>
            <button class="menu-btn btn-secondary" onclick="showLevelSelect()">🗺 К КАРТЕ</button>
            <button class="menu-btn btn-back" onclick="toMainMenu()">🏠 МЕНЮ</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
