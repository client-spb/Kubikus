<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Прыг-Скок: Уровни</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        overflow: hidden;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        font-family: 'Nunito', sans-serif;
        touch-action: none;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        user-select: none;
        -webkit-user-select: none;
    }

    #game-container {
        position: relative;
        box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
        border-radius: 20px;
        overflow: hidden;
        width: 100%;
        max-width: 400px;
        height: 100%;
        max-height: 700px;
        background: linear-gradient(180deg, #2d3436 0%, #1a1a2e 100%);
    }

    canvas {
        display: block;
        background: linear-gradient(to bottom, #667eea 0%, #764ba2 50%, #f093fb 100%);
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
    }

    /* HUD */
    #score-hud {
        position: absolute;
        top: 15px;
        left: 50%;
        transform: translateX(-50%);
        color: #fff;
        font-size: 18px;
        font-weight: 800;
        z-index: 10;
        background: linear-gradient(135deg, rgba(102, 126, 234, 0.95), rgba(118, 75, 162, 0.95));
        padding: 10px 25px;
        border-radius: 25px;
        pointer-events: none;
        display: none;
        box-shadow: 0 8px 32px rgba(102, 126, 234, 0.4), inset 0 1px 0 rgba(255,255,255,0.2);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.2);
        letter-spacing: 0.5px;
        text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    .screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, rgba(26, 26, 46, 0.95), rgba(15, 52, 96, 0.9));
        backdrop-filter: blur(10px);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 100;
        transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .hidden { display: none !important; opacity: 0; }

    .menu-panel {
        background: linear-gradient(145deg, #ffffff 0%, #f8f9fa 100%);
        padding: 30px 25px;
        border-radius: 30px;
        text-align: center;
        box-shadow: 0 25px 50px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.5);
        width: 90%;
        max-width: 350px;
        animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        position: relative;
        overflow: hidden;
    }

    .menu-panel::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(102, 126, 234, 0.1) 0%, transparent 70%);
        animation: shimmer 3s infinite;
    }

    @keyframes shimmer {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(-20%, -20%); }
    }

    @keyframes popIn {
        from { transform: scale(0.7) translateY(20px); opacity: 0; }
        to { transform: scale(1) translateY(0); opacity: 1; }
    }

    @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }

    .game-title {
        font-size: 38px;
        margin: 0 0 25px 0;
        background: linear-gradient(135deg, #ff6b6b 0%, #feca57 50%, #ff6b6b 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-transform: uppercase;
        font-weight: 900;
        animation: gradientShift 3s ease infinite;
        filter: drop-shadow(0 4px 8px rgba(255, 107, 107, 0.3));
        position: relative;
        z-index: 1;
    }

    @keyframes gradientShift {
        0%, 100% { background-position: 0% center; }
        50% { background-position: 100% center; }
    }

    .menu-btn {
        display: block;
        width: 100%;
        padding: 14px 0;
        margin: 10px 0;
        border: none;
        border-radius: 16px;
        font-size: 17px;
        font-weight: 800;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        color: white;
        position: relative;
        overflow: hidden;
        z-index: 1;
        font-family: 'Nunito', sans-serif;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .menu-btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
        opacity: 0;
        transition: opacity 0.3s;
        z-index: -1;
    }

    .menu-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .menu-btn:hover::before {
        opacity: 1;
    }

    .menu-btn:active {
        transform: translateY(0) scale(0.98);
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .btn-play {
        background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
        font-size: 20px;
        box-shadow: 0 8px 25px rgba(0, 184, 148, 0.4);
    }

    .btn-play:hover {
        box-shadow: 0 12px 35px rgba(0, 184, 148, 0.5);
    }

    .btn-secondary {
        background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
        box-shadow: 0 8px 25px rgba(108, 92, 231, 0.4);
    }

    .btn-secondary:hover {
        box-shadow: 0 12px 35px rgba(108, 92, 231, 0.5);
    }

    .btn-back {
        background: linear-gradient(135deg, #636e72 0%, #b2bec3 100%);
        margin-top: 15px;
        box-shadow: 0 6px 20px rgba(99, 110, 114, 0.3);
    }

    .btn-start-lvl {
        background: linear-gradient(135deg, #fdcb6e 0%, #ffeaa7 100%);
        color: #2d3436;
        font-size: 19px;
        box-shadow: 0 8px 25px rgba(253, 203, 110, 0.4);
    }

    .btn-start-lvl:hover {
        box-shadow: 0 12px 35px rgba(253, 203, 110, 0.5);
    }

    /* Сетка уровней */
    #levels-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
        margin-bottom: 20px;
    }

    .level-node {
        aspect-ratio: 1;
        background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
        border-radius: 16px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 20px;
        font-weight: 800;
        color: white;
        cursor: pointer;
        position: relative;
        box-shadow: 0 6px 0 #009174, 0 10px 20px rgba(0, 184, 148, 0.3);
        transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        overflow: hidden;
    }

    .level-node::after {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        transition: left 0.5s;
    }

    .level-node:hover::after {
        left: 100%;
    }

    .level-node:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 0 #009174, 0 15px 30px rgba(0, 184, 148, 0.4);
    }

    .level-node:active {
        transform: translateY(4px);
        box-shadow: 0 2px 0 #009174, 0 5px 10px rgba(0, 184, 148, 0.3);
    }

    .level-node.locked {
        background: linear-gradient(135deg, #636e72 0%, #b2bec3 100%);
        box-shadow: 0 6px 0 #2d3436, 0 10px 20px rgba(99, 110, 114, 0.3);
        cursor: not-allowed;
    }

    .level-node.locked::after {
        content: "🔒";
        font-size: 22px;
        filter: grayscale(1);
        opacity: 0.7;
    }

    .level-node.locked:hover {
        transform: none;
        box-shadow: 0 6px 0 #2d3436, 0 10px 20px rgba(99, 110, 114, 0.3);
    }

    .level-node.completed {
        background: linear-gradient(135deg, #fdcb6e 0%, #ffeaa7 100%);
        box-shadow: 0 6px 0 #e17055, 0 10px 20px rgba(253, 203, 110, 0.3);
    }

    .level-node.completed::before {
        content: "★";
        position: absolute;
        top: 4px;
        right: 6px;
        font-size: 12px;
        color: #fff;
        text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    .level-node.completed:hover {
        box-shadow: 0 10px 0 #e17055, 0 15px 30px rgba(253, 203, 110, 0.4);
    }

    /* Превью уровня */
    .preview-icon {
        font-size: 70px;
        margin: 15px 0;
        display: block;
        animation: float 2s ease-in-out infinite;
        filter: drop-shadow(0 8px 16px rgba(0,0,0,0.2));
    }

    .level-desc {
        font-size: 16px;
        color: #555;
        margin-bottom: 20px;
        line-height: 1.6;
        font-weight: 600;
    }

    .level-difficulty {
        font-size: 13px;
        color: #888;
        margin-bottom: 15px;
        text-transform: uppercase;
        letter-spacing: 2px;
        font-weight: 700;
    }

    /* Game Over */
    .final-score {
        font-size: 52px;
        font-weight: 900;
        color: #2d3436;
        margin: 15px 0;
        background: linear-gradient(135deg, #6c5ce7, #a29bfe);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 4px 8px rgba(108, 92, 231, 0.3));
    }

    .status-msg {
        font-size: 17px;
        font-weight: 800;
        margin-bottom: 15px;
        min-height: 24px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .status-success {
        color: #00b894;
        text-shadow: 0 2px 4px rgba(0, 184, 148, 0.3);
    }

    .status-fail {
        color: #e17055;
        text-shadow: 0 2px 4px rgba(225, 112, 85, 0.3);
    }

    /* Анимированный фон с облаками */
    .cloud-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: 0;
        pointer-events: none;
    }

    .cloud {
        position: absolute;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        filter: blur(20px);
        animation: cloudFloat 20s infinite;
    }

    .cloud:nth-child(1) {
        width: 200px;
        height: 200px;
        top: 10%;
        left: -10%;
        animation-delay: 0s;
        animation-duration: 25s;
    }

    .cloud:nth-child(2) {
        width: 150px;
        height: 150px;
        top: 60%;
        right: -5%;
        animation-delay: -10s;
        animation-duration: 30s;
    }

    .cloud:nth-child(3) {
        width: 100px;
        height: 100px;
        top: 30%;
        right: 20%;
        animation-delay: -5s;
        animation-duration: 20s;
    }

    @keyframes cloudFloat {
        0%, 100% { transform: translate(0, 0) rotate(0deg); }
        33% { transform: translate(30px, -20px) rotate(5deg); }
        66% { transform: translate(-20px, 30px) rotate(-5deg); }
    }

    /* Декоративные элементы */
    .deco-circle {
        position: absolute;
        border-radius: 50%;
        background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3));
        animation: pulse 4s ease-in-out infinite;
    }

    .deco-circle:nth-child(4) {
        width: 300px;
        height: 300px;
        top: -150px;
        right: -150px;
    }

    .deco-circle:nth-child(5) {
        width: 200px;
        height: 200px;
        bottom: -100px;
        left: -100px;
        animation-delay: -2s;
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.5; }
        50% { transform: scale(1.1); opacity: 0.8; }
    }

    /* Заголовок карты миров */
    .world-map-title {
        color: #fff;
        margin-bottom: 20px;
        font-size: 24px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 3px;
        text-shadow: 0 4px 8px rgba(0,0,0,0.3);
        position: relative;
        z-index: 1;
    }

    .world-map-title::after {
        content: '';
        position: absolute;
        bottom: -8px;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        height: 3px;
        background: linear-gradient(90deg, transparent, #feca57, transparent);
        border-radius: 2px;
    }

</style>
</head>
<body>

<!-- Декоративный фон -->
<div class="cloud-bg">
    <div class="cloud"></div>
    <div class="cloud"></div>
    <div class="cloud"></div>
    <div class="deco-circle"></div>
    <div class="deco-circle"></div>
</div>

<div id="game-container">
    <div id="score-hud">Цель: 0/20</div>
    <canvas id="game" width="400" height="600"></canvas>

    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="mainMenu" class="screen">
        <div class="menu-panel">
            <h1 class="game-title">ПРЫГ-СКОК</h1>
            <button class="menu-btn btn-play" onclick="showLevelSelect()">🎮 ИГРАТЬ</button>
            <button class="menu-btn btn-secondary" onclick="alert('В разработке')">🏆 РЕЙТИНГ</button>
        </div>
    </div>

    <!-- ВЫБОР УРОВНЯ -->
    <div id="levelSelect" class="screen hidden">
        <div class="world-map-title">КАРТА МИРОВ</div>
        <div id="levels-grid"></div>
        <button class="menu-btn btn-back" style="width: 200px;" onclick="toMainMenu()">⬅ НАЗАД</button>
    </div>

    <!-- ПРЕВЬЮ УРОВНЯ -->
    <div id="levelPreview" class="screen hidden">
        <div class="menu-panel">
            <h2 id="prevTitle" style="margin:0; color:#333; font-weight:900;">Уровень 1</h2>
            <div id="prevIcon" class="preview-icon">🪙</div>
            <div class="level-difficulty">⭐ Сложность: <span id="prevDiff">Легко</span></div>
            <div id="prevDesc" class="level-desc">Описание...</div>

            <button class="menu-btn btn-start-lvl" onclick="confirmStartLevel()">▶ НАЧАТЬ</button>
            <button class="menu-btn btn-back" onclick="backToGrid()">✕ ОТМЕНА</button>
        </div>
    </div>

    <!-- GAME OVER -->
    <div id="gameOverScreen" class="screen hidden">
        <div class="menu-panel">
            <h1 class="game-title" style="font-size: 28px;">🎯 ФИНИШ</h1>
            <div id="endStatus" class="status-msg">Результат</div>
            <div class="final-score" id="finalScoreValue">0</div>

            <button class="menu-btn btn-play" onclick="restartLevel()">🔄 ЗАНОВО</button>
            <button class="menu-btn btn-secondary" onclick="showLevelSelect()">🗺 К КАРТЕ</button>
            <button class="menu-btn btn-back" onclick="toMainMenu()">🏠 МЕНЮ</button>
        </div>
    </div>
</div>

<script>
// ==================== ТИПЫ ПЛАТФОРМ ====================
const PLATFORM_TYPES = {
    GRASS: { 
        id: 'grass', 
        name: 'Трава', 
        color: '#66BB6A', 
        friction: 1.0, 
        damage: false,
        icon: '🌿'
    },
    ICE: { 
        id: 'ice', 
        name: 'Лёд', 
        color: '#A5D8FF', 
        friction: 0.3, 
        damage: false,
        icon: '🧊'
    },
    SNOW: { 
        id: 'snow', 
        name: 'Снег', 
        color: '#E8F4F8', 
        friction: 0.6, 
        damage: false,
        icon: '❄️'
    },
    SPIKES: { 
        id: 'spikes', 
        name: 'Шипы', 
        color: '#E74C3C', 
        friction: 0.8, 
        damage: true,
        icon: '🔺'
    },
    STONE: { 
        id: 'stone', 
        name: 'Камень', 
        color: '#7F8C8D', 
        friction: 0.9, 
        damage: false,
        icon: '🪨'
    }
};

// ==================== КОНФИГУРАЦИЯ УРОВНЕЙ ====================
// Здесь настраивается логика каждого уровня
const LEVELS_CONFIG = [
    {
        id: 1,
        title: "Зеленая Долина",
        type: "coins", // Сбор монет
        target: 20,
        speedMod: 1.0,
        desc: "Собери 20 золотых монет, чтобы открыть портал.",
        icon: "🪙",
        diff: "Новичок",
        platforms: [
            { type: 'grass', chance: 5 },
            { type: 'stone', chance: 2 }
        ]
    },
    {
        id: 2,
        title: "Испытание Временем",
        type: "time", // Выживание по времени
        target: 60, // Секунды
        speedMod: 1.2,
        desc: "Продержись 60 секунд в этом опасном мире.",
        icon: "⏱️",
        diff: "Любитель",
        platforms: [
            { type: 'snow', chance: 4 },
            { type: 'ice', chance: 3 },
            { type: 'grass', chance: 2 }
        ]
    },
    {
        id: 3,
        title: "Скоростной Забег",
        type: "jumps", // Количество прыжков
        target: 50,
        speedMod: 1.8, // Быстрее
        desc: "Прыгни на 50 платформ. Осторожно, скорость увеличена!",
        icon: "🟩",
        diff: "Эксперт",
        platforms: [
            { type: 'stone', chance: 5 },
            { type: 'spikes', chance: 2 },
            { type: 'ice', chance: 3 }
        ]
    }
    // Можно добавить еще уровни здесь...
];

const TOTAL_LEVELS = 20; // Всего слотов в сетке
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreElement = document.getElementById('score-hud');
const mainMenu = document.getElementById('mainMenu');
const levelSelectScreen = document.getElementById('levelSelect');
const levelPreviewScreen = document.getElementById('levelPreview');
const gameOverScreen = document.getElementById('gameOverScreen');
const levelsGrid = document.getElementById('levels-grid');

// Элементы превью
const prevTitle = document.getElementById('prevTitle');
const prevIcon = document.getElementById('prevIcon');
const prevDesc = document.getElementById('prevDesc');
const prevDiff = document.getElementById('prevDiff');

// Элементы конца игры
const finalScoreValue = document.getElementById('finalScoreValue');
const endStatus = document.getElementById('endStatus');

// Состояние
let maxUnlockedLevel = parseInt(localStorage.getItem('jumpSkok_maxLevel')) || 1;
let selectedLevelId = null;
let currentLevelConfig = null;

// Аудио
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTone(type) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    const now = audioCtx.currentTime;

    if (type === 'jump') {
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
        gainNode.gain.setValueAtTime(0.2, now);
        gainNode.gain.linearRampToValueAtTime(0, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
    } else if (type === 'coin') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(1200, now);
        osc.frequency.setValueAtTime(1800, now + 0.05);
        gainNode.gain.setValueAtTime(0.1, now);
        gainNode.gain.linearRampToValueAtTime(0, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
    } else if (type === 'die') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
        gainNode.gain.setValueAtTime(0.3, now);
        gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
        osc.start(now); osc.stop(now + 0.3);
    } else if (type === 'win') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.linearRampToValueAtTime(800, now + 0.2);
        gainNode.gain.setValueAtTime(0.2, now);
        gainNode.gain.linearRampToValueAtTime(0, now + 0.4);
        osc.start(now); osc.stop(now + 0.4);
    }
}

// Игровая логика
const GRAVITY = 0.6;
const JUMP_FORCE = -13;
let player = { x: 180, y: 400, width: 30, height: 40, vy: 0, jumping: false };
let platforms = [];
let coins = [];
let score = 0; // Основной счетчик (монеты или прыжки)
let gameTime = 0; // Для уровня на время
let gameRunning = false;
let lastTime = 0;
let animationId;
let touchX = player.x;
let isTouching = false;

// ==================== ИНТЕРФЕЙС ====================

function showLevelSelect() {
    mainMenu.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
    levelPreviewScreen.classList.add('hidden');
    levelSelectScreen.classList.remove('hidden');
    renderLevels();
}

function renderLevels() {
    levelsGrid.innerHTML = '';
    for (let i = 1; i <= TOTAL_LEVELS; i++) {
        const btn = document.createElement('div');
        btn.className = 'level-node';

        // Проверяем, есть ли конфиг для этого уровня (для отображения звезды)
        const config = LEVELS_CONFIG.find(l => l.id === i);
        const isConfigured = !!config;

        if (i > maxUnlockedLevel) {
            btn.classList.add('locked');
        } else {
            btn.textContent = i;
            if (i < maxUnlockedLevel || (isConfigured && i === maxUnlockedLevel && false)) {
                // Звездочка только если строго меньше (пройден ранее)
                // Или можно хранить массив пройденных, но пока упростим:
                // Если уровень открыт, значит мы его хотя бы начали.
                // Для простоты: звезда если < maxUnlocked
                btn.classList.add('completed');
            }
            btn.onclick = () => openPreview(i);
        }
        levelsGrid.appendChild(btn);
    }
}

function openPreview(id) {
    selectedLevelId = id;
    // Находим конфиг или создаем дефолтный для будущих уровней
    const config = LEVELS_CONFIG.find(l => l.id === id) || {
        title: `Уровень ${id}`,
        desc: "Стандартный уровень. Прыгай как можно выше!",
        icon: "❓",
        diff: "Нормально",
        type: "score",
        target: 100
    };
    currentLevelConfig = config;

    prevTitle.textContent = config.title;
    prevIcon.textContent = config.icon;
    prevDesc.textContent = config.desc;
    prevDiff.textContent = config.diff;

    levelSelectScreen.classList.add('hidden');
    levelPreviewScreen.classList.remove('hidden');
}

function backToGrid() {
    levelPreviewScreen.classList.add('hidden');
    levelSelectScreen.classList.remove('hidden');
}

function confirmStartLevel() {
    levelPreviewScreen.classList.add('hidden');
    startGame(currentLevelConfig);
}

function startGame(config) {
    currentLevelConfig = config;
    scoreElement.style.display = 'block';

    resetGameVariables();
    landedPlatforms.clear(); // Очищаем набор приземлившихся платформ
    gameRunning = true;
    lastTime = performance.now();
    gameLoop(lastTime);
}

function restartLevel() {
    gameOverScreen.classList.add('hidden');
    startGame(currentLevelConfig);
}

function toMainMenu() {
    levelSelectScreen.classList.add('hidden');
    levelPreviewScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
    mainMenu.classList.remove('hidden');
    scoreElement.style.display = 'none';
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawClouds();
}

function checkWinCondition() {
    if (!currentLevelConfig) return false;

    let won = false;
    if (currentLevelConfig.type === 'coins' && score >= currentLevelConfig.target) won = true;
    if (currentLevelConfig.type === 'jumps' && score >= currentLevelConfig.target) won = true;
    if (currentLevelConfig.type === 'time' && gameTime >= currentLevelConfig.target) won = true;

    if (won) {
        finishLevel(true);
    }
}

function finishLevel(success) {
    gameRunning = false;
    cancelAnimationFrame(animationId);

    if (success) {
        playTone('win');
        endStatus.textContent = "УРОВЕНЬ ПРОЙДЕН!";
        endStatus.className = "status-msg status-success";
        finalScoreValue.textContent = currentLevelConfig.icon; // Показываем иконку вместо очков

        // Открываем следующий уровень
        if (selectedLevelId === maxUnlockedLevel && maxUnlockedLevel < TOTAL_LEVELS) {
            maxUnlockedLevel++;
            localStorage.setItem('jumpSkok_maxLevel', maxUnlockedLevel);
        }
    } else {
        playTone('die');
        endStatus.textContent = "НЕУДАЧА";
        endStatus.className = "status-msg status-fail";
        // Показываем прогресс
        if (currentLevelConfig.type === 'time') {
             finalScoreValue.textContent = Math.floor(gameTime) + " сек";
        } else {
             finalScoreValue.textContent = score + " / " + currentLevelConfig.target;
        }
    }

    setTimeout(() => {
        gameOverScreen.classList.remove('hidden');
    }, 500);
}

function resetGameVariables() {
    player.x = canvas.width / 2 - 15;
    player.y = 400;
    player.vy = 0;
    score = 0;
    gameTime = 0;
    generatePlatforms();
    updateHUD();
}

function updateHUD() {
    if (!currentLevelConfig) return;

    let text = "";
    if (currentLevelConfig.type === 'coins') {
        text = `🪙 ${score} / ${currentLevelConfig.target}`;
    } else if (currentLevelConfig.type === 'jumps') {
        text = `🟩 Прыжки: ${score} / ${currentLevelConfig.target}`;
    } else if (currentLevelConfig.type === 'time') {
        text = `⏱️ ${Math.floor(gameTime)} / ${currentLevelConfig.target} сек`;
    } else {
        text = `Счёт: ${score}`;
    }
    scoreElement.textContent = text;
}

// ==================== ДВИЖОК ИГРЫ ====================

// Функция выбора типа платформы на основе настроек уровня
function getRandomPlatformType() {
    if (!currentLevelConfig || !currentLevelConfig.platforms) {
        return PLATFORM_TYPES.GRASS;
    }
    
    // Собираем все шансы
    let totalChance = 0;
    const platformChances = currentLevelConfig.platforms.map(p => {
        totalChance += p.chance;
        return { type: p.type, chance: p.chance };
    });
    
    // Генерируем случайное число
    let random = Math.random() * totalChance;
    
    // Выбираем тип платформы
    for (let pc of platformChances) {
        if (random < pc.chance) {
            return Object.values(PLATFORM_TYPES).find(pt => pt.id === pc.type) || PLATFORM_TYPES.GRASS;
        }
        random -= pc.chance;
    }
    
    return PLATFORM_TYPES.GRASS;
}

function generatePlatforms() {
    platforms = [];
    coins = [];
    // Стартовая платформа всегда безопасная (трава)
    platforms.push({ 
        x: 150, 
        y: 500, 
        width: 100, 
        height: 15,
        type: PLATFORM_TYPES.GRASS
    });
    for (let i = 1; i < 8; i++) {
        createPlatform(i * 90);
    }
}

function createPlatform(yPos) {
    const platformType = getRandomPlatformType();
    let p = { 
        x: Math.random() * (canvas.width - 90), 
        y: yPos, 
        width: 80 + Math.random() * 30, 
        height: 15,
        type: platformType
    };
    platforms.push(p);
    if (Math.random() < 0.6 && !platformType.damage) {
        coins.push({ x: p.x + p.width/2 - 10, y: p.y - 30, width: 20, height: 20, collected: false });
    }
}

// Доработка логики прыжков для уровня 3
let lastJumpState = false;
let landedPlatforms = new Set(); // Для отслеживания уникальных платформ

function gameLoop(timestamp) {
    if (!gameRunning) return;
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawClouds();

    if (currentLevelConfig.type === 'time') {
        gameTime += (timestamp - lastTime) / 1000;
        updateHUD();
        checkWinCondition();
        if(!gameRunning) return;
    }
    lastTime = timestamp;

    if (isTouching) {
        const dx = touchX - (player.x + player.width / 2);
        player.x += dx * 0.15;
    }

    player.vy += GRAVITY;
    player.y += player.vy;
    if (player.x + player.width < 0) player.x = canvas.width;
    if (player.x > canvas.width) player.x = -player.width;

    const speedMultiplier = currentLevelConfig ? currentLevelConfig.speedMod : 1.0;
    const moveSpeed = 2.0 * speedMultiplier;

    let onGround = false;

    for (let p of platforms) {
        p.y += moveSpeed;
        
        // Создаем уникальный ID для платформы
        if (!p.id) {
            p.id = Math.random().toString(36).substr(2, 9);
        }
        
        if (player.vy > 0 &&
            player.x + player.width > p.x &&
            player.x < p.x + p.width &&
            player.y + player.height > p.y &&
            player.y + player.height - player.vy <= p.y + 10) {

            // Проверка на шипы - мгновенная смерть
            if (p.type && p.type.damage) {
                finishLevel(false);
                return;
            }

            player.y = p.y - player.height;
            player.vy = 0;
            onGround = true;

            // Логика для уровня "Прыжки" (Тип 3)
            // Считаем только новые платформы
            if (currentLevelConfig.type === 'jumps' && !landedPlatforms.has(p.id)) {
                landedPlatforms.add(p.id);
                score++;
                updateHUD();
                checkWinCondition();
            }
        }
        if (p.y > canvas.height) {
            p.y = -20;
            p.x = Math.random() * (canvas.width - p.width);
            p.width = 80 + Math.random() * 30;
            // При респауне выбираем новый тип платформы
            const newPlatformType = getRandomPlatformType();
            p.type = newPlatformType;
            p.id = Math.random().toString(36).substr(2, 9); // Новый ID
            
            if (Math.random() < 0.5 && !newPlatformType.damage) {
                coins.push({ x: p.x + p.width/2 - 10, y: p.y - 30, width: 20, height: 20, collected: false });
            }
        }
    }

    // Монетки
    for (let i = coins.length - 1; i >= 0; i--) {
        let c = coins[i];
        if (!c.collected &&
            player.x < c.x + c.width && player.x + player.width > c.x &&
            player.y < c.y + c.height && player.y + player.height > c.y) {
            c.collected = true;
            if (currentLevelConfig.type === 'coins') {
                score++;
                updateHUD();
                checkWinCondition();
            }
            playTone('coin');
        }
        if (c.collected) coins.splice(i, 1);
        else {
            c.y += moveSpeed;
            if (c.y > canvas.height) coins.splice(i, 1);
        }
    }

    if (player.y > canvas.height) finishLevel(false);

    drawGameObjects();
    if (gameRunning) animationId = requestAnimationFrame(gameLoop);
}


function drawClouds() {
    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.beginPath(); ctx.arc(50, 100, 30, 0, Math.PI*2); ctx.arc(90, 100, 40, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(250, 250, 25, 0, Math.PI*2); ctx.arc(290, 250, 35, 0, Math.PI*2); ctx.fill();
}

function drawGameObjects() {
    // Отрисовка платформ с учетом их типа
    for (let p of platforms) {
        const platformType = p.type || PLATFORM_TYPES.GRASS;
        
        // Основной цвет платформы
        ctx.fillStyle = platformType.color;
        ctx.fillRect(p.x, p.y, p.width, p.height);
        
        // Декоративная обводка
        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
        ctx.lineWidth = 2;
        ctx.strokeRect(p.x, p.y, p.width, p.height);
        
        // Если это шипы - рисуем треугольники сверху
        if (platformType.id === 'spikes') {
            ctx.fillStyle = '#C0392B';
            const spikeCount = Math.floor(p.width / 15);
            for (let i = 0; i < spikeCount; i++) {
                ctx.beginPath();
                ctx.moveTo(p.x + i * 15, p.y);
                ctx.lineTo(p.x + i * 15 + 7.5, p.y - 12);
                ctx.lineTo(p.x + i * 15 + 15, p.y);
                ctx.fill();
            }
        }
        
        // Если это снег или лёд - добавляем блеск
        if (platformType.id === 'snow' || platformType.id === 'ice') {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.fillRect(p.x + 5, p.y + 3, p.width - 10, 3);
        }
        
        // Если это камень - добавляем текстуру
        if (platformType.id === 'stone') {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            for (let i = 0; i < 3; i++) {
                const rx = p.x + Math.random() * p.width;
                const ry = p.y + Math.random() * p.height;
                ctx.fillRect(rx, ry, 4, 3);
            }
        }
    }
    
    ctx.fillStyle = '#FFD700';
    for (let c of coins) {
        if(!c.collected) { ctx.beginPath(); ctx.arc(c.x+10, c.y+10, 8, 0, Math.PI*2); ctx.fill(); }
    }
    // Герой
    ctx.fillStyle = '#FF5722';
    ctx.fillRect(player.x, player.y, player.width, player.height);
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(player.x+10, player.y+12, 5, 0, Math.PI*2); ctx.arc(player.x+20, player.y+12, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'black';
    ctx.beginPath(); ctx.arc(player.x+10, player.y+12, 2, 0, Math.PI*2); ctx.arc(player.x+20, player.y+12, 2, 0, Math.PI*2); ctx.fill();
}

function jump() {
    if (gameRunning) {
        player.vy = JUMP_FORCE;
        playTone('jump');
    }
}

// Обработчики ввода
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (!gameRunning) return;
    isTouching = true;
    touchX = e.touches[0].clientX - canvas.getBoundingClientRect().left;
    jump();
}, {passive: false});

canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!gameRunning) return;
    touchX = e.touches[0].clientX - canvas.getBoundingClientRect().left;
}, {passive: false});

canvas.addEventListener('touchend', () => isTouching = false);

canvas.addEventListener('mousedown', e => {
    if (!gameRunning) return;
    isTouching = true;
    touchX = e.offsetX;
    jump();
});
canvas.addEventListener('mousemove', e => { if(isTouching) touchX = e.offsetX; });
canvas.addEventListener('mouseup', () => isTouching = false);

drawClouds();
</script>
