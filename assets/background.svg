<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#B3E5FC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E1F5FE;stop-opacity:1" />
    </linearGradient>
    <filter id="cloudShadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Небо -->
  <rect width="800" height="600" fill="url(#skyGradient)" />
  
  <!-- Солнце -->
  <circle cx="700" cy="80" r="50" fill="#FFEB3B" opacity="0.9">
    <animate attributeName="r" values="50;55;50" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="700" cy="80" r="60" fill="#FFF9C4" opacity="0.4" />
  
  <!-- Облака -->
  <g filter="url(#cloudShadow)" opacity="0.9">
    <ellipse cx="150" cy="120" rx="60" ry="25" fill="#FFFFFF" />
    <ellipse cx="190" cy="110" rx="50" ry="22" fill="#FFFFFF" />
    <ellipse cx="110" cy="110" rx="45" ry="20" fill="#FFFFFF" />
    
    <ellipse cx="400" cy="180" rx="70" ry="28" fill="#FFFFFF" />
    <ellipse cx="450" cy="165" rx="55" ry="24" fill="#FFFFFF" />
    <ellipse cx="350" cy="165" rx="50" ry="22" fill="#FFFFFF" />
    
    <ellipse cx="650" cy="140" rx="55" ry="22" fill="#FFFFFF" />
    <ellipse cx="690" cy="130" rx="45" ry="20" fill="#FFFFFF" />
    <ellipse cx="610" cy="130" rx="40" ry="18" fill="#FFFFFF" />
  </g>
  
  <!-- Дальние холмы -->
  <ellipse cx="200" cy="550" rx="300" ry="100" fill="#A5D6A7" opacity="0.6" />
  <ellipse cx="600" cy="560" rx="280" ry="90" fill="#81C784" opacity="0.5" />
  
  <!-- Трава на переднем плане (низ) -->
  <rect x="0" y="580" width="800" height="20" fill="#66BB6A" />
</svg>
